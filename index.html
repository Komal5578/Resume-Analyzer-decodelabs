<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume Analyzer — Score &amp; Optimize Your Resume</title>
  <meta name="description" content="Paste your resume and a job description to get an instant analysis with keyword matching, scoring, and actionable suggestions." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo" aria-label="Resume Analyzer logo">
        <span class="logo-icon" aria-hidden="true">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        </span>
        <span class="logo-text">Resume<strong>Analyzer</strong></span>
      </div>
      <p class="tagline">Score &amp; optimize your resume in seconds</p>
    </div>
  </header>

  <!-- ===== MAIN ===== -->
  <main class="app-main">
    <div class="app-grid">

      <!-- ── INPUT SECTION ── -->
      <section class="input-section" aria-labelledby="input-heading">
        <h1 id="input-heading" class="section-title">Paste Your Content</h1>

        <div class="input-fields">
          <!-- Resume textarea -->
          <div class="field">
            <label for="resume-input" class="field-label">
              <span class="label-icon" aria-hidden="true">📄</span>
              Resume Text <span class="required" aria-label="required">*</span>
            </label>
            <textarea
              id="resume-input"
              class="text-input"
              placeholder="Paste your full resume text here…"
              rows="12"
              required
              aria-required="true"
            ></textarea>
            <span class="char-count" id="resume-count" aria-live="polite">0 words</span>
          </div>

          <!-- Job Description textarea -->
          <div class="field">
            <label for="jd-input" class="field-label">
              <span class="label-icon" aria-hidden="true">🎯</span>
              Job Description <span class="optional">(optional)</span>
            </label>
            <textarea
              id="jd-input"
              class="text-input"
              placeholder="Paste the target job description for keyword matching…"
              rows="12"
            ></textarea>
            <span class="char-count" id="jd-count" aria-live="polite">0 words</span>
          </div>
        </div>

        <!-- Analyze button -->
        <div class="action-bar">
          <button id="analyze-btn" class="btn-analyze" type="button">
            <span class="btn-label">Analyze Resume</span>
            <span class="btn-icon" aria-hidden="true">→</span>
          </button>
          <button id="clear-btn" class="btn-clear" type="button">Clear All</button>
        </div>
      </section>

      <!-- ── RESULTS SECTION ── -->
      <section class="results-section" id="results-section" aria-labelledby="results-heading" aria-live="polite">
        <!-- Empty state (default) -->
        <div class="empty-state" id="empty-state">
          <div class="empty-icon" aria-hidden="true">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </div>
          <h2 id="results-heading" class="empty-title">No Analysis Yet</h2>
          <p class="empty-description">Paste your resume (and optionally a job description) then click <strong>Analyze Resume</strong> to see your results here.</p>
        </div>

        <!-- Loading state (hidden by default) -->
        <div class="loading-state hidden" id="loading-state">
          <div class="spinner" aria-hidden="true"></div>
          <p class="loading-text">Analyzing your resume…</p>
        </div>

        <!-- Results container (hidden by default, filled dynamically) -->
        <div class="results-container hidden" id="results-container">
          <!-- Dynamically populated by script.js -->
        </div>
      </section>

    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    <p>&copy; 2026 ResumeAnalyzer &middot; Built for demonstration purposes</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
